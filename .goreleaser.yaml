version: 2
project_name: skool-pp-cli
changelog:
  disable: true
builds:
  - id: skool-pp-cli
    main: ./cmd/skool-pp-cli
    binary: skool-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X skool-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: skool-pp-mcp
    main: ./cmd/skool-pp-mcp
    binary: skool-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: skool-pp-cli
    repository:
      owner: robj1925
      name: homebrew-tap
    homepage: "https://github.com/robj1925/skool-pp-cli"
    description: "Discovered API spec for skool"
    install: |
      bin.install "skool-pp-cli"
      bin.install "skool-pp-mcp"
